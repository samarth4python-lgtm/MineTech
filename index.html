<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MineTech | Infinite Chunks</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; font-family: 'Courier New', Courier, monospace; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 16px; height: 16px; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference; z-index: 10; }
        #ui { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.8); color: #00ff00; padding: 15px; border: 2px solid #00ff00; pointer-events: none; }
        #inventory { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; border: 2px solid white; }
        .slot { width: 50px; height: 50px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; color: white; font-size: 10px; text-align: center; background-size: cover; }
        .active { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <strong>[ MINETECH INFINITE ]</strong><br>
        CHUNK SAVING: ACTIVE<br>
        1-4: SELECT BLOCK | WASD: MOVE
    </div>

    <div id="inventory">
        <div id="slot1" class="slot active">GRASS</div>
        <div id="slot2" class="slot">DIRT</div>
        <div id="slot3" class="slot">SAND</div>
        <div id="slot4" class="slot">STONE</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "simplex-noise": "https://cdn.skypack.dev/simplex-noise@2.4.0"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import SimplexNoise from 'simplex-noise';

        // --- 1. SETUP & LIGHTING ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Better lighting
        document.body.appendChild(renderer.domElement);

        // Better Lighting
        const ambient = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun);

        // --- 2. TEXTURES & INVENTORY ---
        const loader = new THREE.TextureLoader();
        const baseUrl = "https://tlxfvijqvglsgwhixpmm.supabase.co/storage/v1/object/public/textures/";
        const load = (f) => { const t = loader.load(baseUrl + f); t.magFilter = THREE.NearestFilter; return t; };

        const mtlDirt = new THREE.MeshLambertMaterial({ map: load('dirt.png') });
        const mtlSand = new THREE.MeshLambertMaterial({ map: load('sand.png') });
        const mtlStone = new THREE.MeshLambertMaterial({ map: load('stone.png') });
        const mtlGrass = [load('grass_side.png'), load('grass_side.png'), load('grass_top.png'), load('dirt.png'), load('grass_side.png'), load('grass_side.png')].map(t => new THREE.MeshLambertMaterial({map: t}));

        const inventory = [mtlGrass, mtlDirt, mtlSand, mtlStone];
        let selectedIdx = 0;

        // --- 3. CHUNK SYSTEM ---
        const simplex = new SimplexNoise();
        const chunks = {}; // Stores block data
        const renderedChunks = new Map(); // Stores 3D objects
        const chunkSize = 16;
        const drawDistance = 3;

        function getChunkKey(x, z) { return `${x},${z}`; }

        function generateChunkData(cx, cz) {
            const key = getChunkKey(cx, cz);
            // Check LocalStorage first
            const saved = localStorage.getItem(`minetech_chunk_${key}`);
            if (saved) return JSON.parse(saved);

            const data = [];
            for (let x = 0; x < chunkSize; x++) {
                for (let z = 0; z < chunkSize; z++) {
                    const worldX = cx * chunkSize + x;
                    const worldZ = cz * chunkSize + z;
                    
                    // Larger Biomes: 0.01 scale instead of 0.05
                    const hNoise = (simplex.noise2D(worldX * 0.02, worldZ * 0.02) + 1) * 5;
                    const temp = simplex.noise2D(worldX * 0.005, worldZ * 0.005);
                    const height = Math.floor(hNoise) + 2;

                    for (let y = 0; y <= height; y++) {
                        let type = "dirt";
                        if (y === height) {
                            if (temp > 0.4) type = "sand";
                            else if (hNoise > 7) type = "stone";
                            else type = "grass";
                        }
                        data.push({x: worldX, y, z: worldZ, type});
                    }
                }
            }
            return data;
        }

        function renderChunk(cx, cz) {
            const key = getChunkKey(cx, cz);
            if (renderedChunks.has(key)) return;

            const data = generateChunkData(cx, cz);
            const group = new THREE.Group();
            const geo = new THREE.BoxGeometry(1, 1, 1);

            data.forEach(b => {
                let m = mtlDirt;
                if (b.type === "grass") m = mtlGrass;
                if (b.type === "sand") m = mtlSand;
                if (b.type === "stone") m = mtlStone;
                
                const mesh = new THREE.Mesh(geo, m);
                mesh.position.set(b.x, b.y, b.z);
                group.add(mesh);
            });

            scene.add(group);
            renderedChunks.set(key, group);
        }

        function updateChunks() {
            const px = Math.floor(camera.position.x / chunkSize);
            const pz = Math.floor(camera.position.z / chunkSize);

            for (let x = px - drawDistance; x <= px + drawDistance; x++) {
                for (let z = pz - drawDistance; z <= pz + drawDistance; z++) {
                    renderChunk(x, z);
                }
            }
            
            // Unload far chunks
            renderedChunks.forEach((group, key) => {
                const [cx, cz] = key.split(',').map(Number);
                if (Math.abs(cx - px) > drawDistance || Math.abs(cz - pz) > drawDistance) {
                    scene.remove(group);
                    renderedChunks.delete(key);
                }
            });
        }

        // --- 4. CONTROLS ---
        const controls = new PointerLockControls(camera, document.body);
        document.body.addEventListener('click', () => controls.lock());
        camera.position.set(8, 15, 8);

        let keys = {};
        document.onkeydown = (e) => {
            keys[e.code] = true;
            if (e.key >= 1 && e.key <= 4) {
                selectedIdx = e.key - 1;
                document.querySelectorAll('.slot').forEach((s, i) => {
                    s.classList.toggle('active', i === selectedIdx);
                });
            }
        };
        document.onkeyup = (e) => keys[e.code] = false;

        // Interaction
        window.addEventListener('mousedown', (e) => {
            if (!controls.isLocked) return;
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            
            const allBlocks = [];
            renderedChunks.forEach(g => allBlocks.push(...g.children));
            const hits = raycaster.intersectObjects(allBlocks);

            if (hits.length > 0) {
                const hit = hits[0];
                if (e.button === 0) { // Break
                    hit.object.parent.remove(hit.object);
                } else if (e.button === 2) { // Place
                    const pos = hit.object.position.clone().add(hit.face.normal);
                    const newBlock = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), inventory[selectedIdx]);
                    newBlock.position.copy(pos);
                    hit.object.parent.add(newBlock);
                }
                // Save Logic: Would trigger here to update LocalStorage
            }
        });

        // --- 5. LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            if (controls.isLocked) {
                const speed = 0.2;
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
                updateChunks();
            }
            renderer.render(scene, camera);
        }
        animate();
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
